<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome | Farid Portfolio</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Kanit:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        /* โทนสีพื้นหลังฟ้าเข้มแบบดาร์กๆ (เข้ากับเว็บหลัก) */
        body {
            margin: 0; padding: 0;
            background: radial-gradient(circle at center, #0f172a 0%, #020617 100%);
            height: 100vh;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            font-family: 'Inter', sans-serif; color: #fff; overflow: hidden;
        }

        .intro-content {
            display: flex; flex-direction: column; align-items: center; gap: 30px;
        }

        /* กลุ่มไอคอน 3 ตัว */
        .intro-icons { display: flex; gap: 20px; }

        .icon-glow {
            width: 60px; height: 60px; background: #1e293b; border-radius: 50%;
            display: flex; justify-content: center; align-items: center; font-size: 1.5rem; color: #fff;
            border: 1px solid rgba(59, 130, 246, 0.3); /* สีฟ้า Blue 500 */
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.4), inset 0 0 5px rgba(59, 130, 246, 0.2);
            /* แอนิเมชันเด้งขึ้นมาทีละตัว */
            opacity: 0; transform: scale(0.5) translateY(20px);
            animation: popInIcon 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        .icon-glow:nth-child(1) { animation-delay: 0.2s; }
        .icon-glow:nth-child(2) { animation-delay: 0.4s; }
        .icon-glow:nth-child(3) { animation-delay: 0.6s; }

        /* ข้อความต้อนรับ */
        .intro-title {
            font-weight: 900; font-size: 2.8rem; text-align: center; line-height: 1.3; margin: 0;
            opacity: 0; transform: scale(0.8) translateY(30px);
            animation: popUpText 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            animation-delay: 1s; 
        }
        .highlight-title { color: #3b82f6; text-shadow: 0 0 20px rgba(59, 130, 246, 0.6); }

        /* ป้าย URL สีฟ้าเรืองแสง */
        .intro-url-container {
            display: flex; align-items: center; gap: 10px;
            background: rgba(15, 23, 42, 0.8); border: 2px solid #3b82f6; border-radius: 50px;
            padding: 10px 30px; color: #60a5fa; font-family: 'Kanit', sans-serif; font-size: 1rem; font-weight: 600;
            opacity: 0; transform: translateY(20px);
            animation: popUpText 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards, pulseGlow 2s infinite ease-in-out 2s;
            animation-delay: 1.4s; 
        }

        /* --- Keyframes --- */
        @keyframes popInIcon {
            0% { opacity: 0; transform: scale(0.5) translateY(30px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }
        @keyframes popUpText {
            0% { opacity: 0; transform: translateY(30px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        @keyframes pulseGlow {
            0%, 100% { box-shadow: 0 0 15px rgba(59, 130, 246, 0.4); border-color: #3b82f6; }
            50% { box-shadow: 0 0 25px rgba(59, 130, 246, 0.8); border-color: #60a5fa; }
        }
    </style>
</head>
<body>

    <div class="intro-content">
        <div class="intro-icons">
            <div class="icon-glow"><i class="fa-solid fa-code"></i></div>
            <div class="icon-glow"><i class="fa-solid fa-user"></i></div>
            <div class="icon-glow"><i class="fa-brands fa-github"></i></div>
        </div>
        
        <h2 class="intro-title">
            Welcome To My <br> 
            <span class="highlight-title">Portfolio Website</span>
        </h2>
        
        <div class="intro-url-container">
            <i class="fa-solid fa-globe globe-icon"></i>
            <span>Farid Cheloh</span>
        </div>
    </div>

    <script>
        // ให้เวลาแอนิเมชันโชว์ความเท่ 4 วินาที แล้วดึงเข้าหน้า home.html
        setTimeout(() => {
            window.location.href = 'home.html';
        }, 4000);
    </script>

</body>
</html>
